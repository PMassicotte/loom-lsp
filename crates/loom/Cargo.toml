[package]
name = "loom"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
dashmap = "7.0.0-rc2"
loom-config = { path = "../loom-config" }
tokio = { version = "1.50", features = ["full"] }
tower-lsp = "0.20.0"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
